name: Deploy Health Protocol Worker

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            GITHUB_PAT
            STRAVA_CLIENT_ID
            STRAVA_CLIENT_SECRET
        env:
          GITHUB_PAT: ${{ secrets.RELAY_GH_PAT }}
          STRAVA_CLIENT_ID: ${{ secrets.HP_STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.HP_STRAVA_CLIENT_SECRET }}
