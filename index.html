// ── Live data helpers ───────────────────────────────────────────────
function extractWhoop(data) {
  const cycles = data?._debug?.cycle?.data?.records || [];
  const cur = cycles[0], prev = cycles[1];
  return {
    strain: cur?.score?.strain?.toFixed(1) ?? '—',
    avgHR: cur?.score?.average_heart_rate ?? '—',
    maxHR: cur?.score?.max_heart_rate ?? '—',
    prevStrain: prev?.score?.strain?.toFixed(1) ?? '—',
    weight: data?._debug?.body?.data?.weight_kilogram ?? null,
    fetchedAt: data?.fetched_at,
  };
}
function extractOura(data) {
  const rd = data?.daily_readiness?.data?.data ?? [];
  const sl = data?.daily_sleep?.data?.data ?? [];
  const sp = data?.daily_spo2?.data?.data ?? [];
  const st = data?.daily_stress?.data?.data ?? [];
  const ac = data?.daily_activity?.data?.data ?? [];
  const latest = arr => arr[arr.length - 1];
  const r = latest(rd), s = latest(sl), o = latest(sp), t = latest(st), a = latest(ac);
  return {
    readinessScore: r?.score ?? '—',
    readinessDay: r?.day ?? '',
    hrv: r?.contributors?.hrv_balance ?? '—',
    rhr: r?.contributors?.resting_heart_rate ?? '—',
    sleepScore: s?.score ?? '—',
    rem: s?.contributors?.rem_sleep ?? '—',
    deep: s?.contributors?.deep_sleep ?? '—',
    efficiency: s?.contributors?.efficiency ?? '—',
    spo2: o?.spo2_percentage?.average?.toFixed(1) ?? '—',
    stress: t?.day_summary ?? '—',
    steps: a?.steps?.toLocaleString() ?? '—',
    fetchedAt: data?.fetched_at,
  };
}

// ── Small components ─────────────────────────────────────────────────
function GoalTag({ g }) {
  const c = GOALS[g];
  return c ? <span className="text-xs font-bold px-2 py-0.5 rounded-full whitespace-nowrap" style={{background:c.bg,color:c.text}}>{c.label}</span> : null;
}
function TimingBadge({ t }) {
  const c = TIMING[t];
  return c ? <span className="text-xs font-bold px-2 py-0.5 rounded whitespace-nowrap" style={{background:c.bg,color:c.text}}>{c.label}</span> : null;
}
function CortisolBar({ pressure, status }) {
  const c = CORTISOL_C[status] || CORTISOL_C.MANAGED;
  return (
    <div className="flex items-center gap-2 mt-1">
      <span className="text-xs font-bold tracking-widest" style={{color:'#0A1628',fontSize:9}}>CORTISOL</span>
      <div className="flex-1 h-1.5 rounded-full" style={{background:'#E5E7EB'}}>
        <div className="h-1.5 rounded-full" style={{width:`${Math.max(0,Math.min(100,pressure))}%`,background:c.bar}}/>
      </div>
      <span className="text-xs font-bold px-1.5 py-0.5 rounded-full" style={{background:c.bg,color:c.text,fontSize:9}}>{status}</span>
    </div>
  );
}

      )}
    </div>
  );
}
